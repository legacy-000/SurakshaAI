version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: suraksha_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-suraksha_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-suraksha_secure_pass}
      POSTGRES_DB: ${DB_NAME:-suraksha_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/sql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-suraksha_admin} -d ${DB_NAME:-suraksha_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suraksha_network

  redis:
    image: redis:7.0-alpine
    container_name: suraksha_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suraksha_network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: suraksha_backend
    restart: always
    environment:
      - ENV=production
      - DEBUG=false
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-suraksha_admin}
      - DB_PASSWORD=${DB_PASSWORD:-suraksha_secure_pass}
      - DB_NAME=${DB_NAME:-suraksha_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_pass}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
      - ./ai_engine/rag/faiss_index:/app/ai_engine/rag/faiss_index
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - suraksha_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: suraksha_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - suraksha_network

networks:
  suraksha_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
