<!DOCTYPE html>
<html>
<head>
    <title>Suraksha AI Precinct Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .header { text-align: center; border-bottom: 2px solid #334e68; padding-bottom: 10px; }
        .title { color: #102a43; margin-bottom: 5px; }
        .subtitle { color: #627d98; font-size: 14px; }
        .section { margin-top: 30px; }
        .section-title { color: #334e68; border-bottom: 1px solid #bcccdc; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">KARNATAKA POLICE DEPARTMENT</h1>
        <div class="subtitle">Suraksha AI Automated Intelligence Report</div>
    </div>
    
    <div class="section">
        <h2 class="section-title">Case details</h2>
        <p><strong>Case Number:</strong> {{ fir_number }}</p>
        <p><strong>Crime Type:</strong> {{ crime_type }}</p>
        <p><strong>Status:</strong> {{ status }}</p>
    </div>

    <div class="section">
        <h2 class="section-title">AI Pattern Summary</h2>
        <p>{{ ai_summary }}</p>
    </div>
</body>
</html>
