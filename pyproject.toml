[tool.poetry]
name = "suraksha-ai"
version = "0.1.0"
description = "Crime Intelligence Platform for Karnataka Police"
authors = ["Suraksha AI Architect <architect@suraksha.ai>"]
readme = "README.md"
packages = [
    { include = "backend" },
    { include = "ai_engine" }
]

[tool.poetry.dependencies]
python = "^3.10"

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
avoid_as_keyword = true

[[tool.mypy.overrides]]
module = [
    "sqlalchemy.*",
    "geoalchemy2.*",
    "langchain.*",
    "langgraph.*",
    "faiss.*",
    "sentence_transformers.*",
    "networkx.*",
    "redis.*"
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
asyncio_mode = "auto"
python_files = "test_*.py"
